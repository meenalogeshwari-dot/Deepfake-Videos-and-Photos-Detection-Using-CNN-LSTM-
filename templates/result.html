<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Detection Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .result-card {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
            text-align: center;
            width: 450px;
        }

        h2 {
            color: #00ffff;
            margin-bottom: 20px;
        }

        img {
            width: 250px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid #00ffff;
        }

        .real {
            color: #00ff99;
            font-weight: bold;
            font-size: 20px;
        }

        .fake {
            color: #ff4d4d;
            font-weight: bold;
            font-size: 20px;
        }

        .btn-back {
            margin-top: 20px;
            background-color: #00ffff;
            border: none;
            color: black;
            font-weight: bold;
            width: 100%;
        }

        .btn-back:hover {
            background-color: #00cccc;
        }
    </style>
</head>

<body>

    <div class="result-card">
        <h2>🤖 Detection Result</h2>

        <!-- 🔥 Prediction -->
        {% if prediction.startswith("REAL") %}
            <p class="real">✅ {{ prediction }}</p>
        {% else %}
            <p class="fake">⚠️ {{ prediction }}</p>
        {% endif %}

        <!-- 🔥 Confidence -->
        <p>Confidence: {{ score }}%</p>

        <!-- 🔙 Back Button -->
        <a href="/" class="btn btn-back">🔙 Upload Another File</a>
    </div>

</body>
</html>
